<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Precisão e Exatidão - Rodrigo Niskier</title>
    <style>
        /* ESTILOS (CSS) - Define a aparência do aplicativo */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h2 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Garante que o padding não quebre o layout */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .resultados {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            display: none; /* Escondido até que o botão seja clicado */
        }
        .interpretacao { margin-top: 15px; font-weight: bold; }
        .bom { color: #27ae60; }
        .ruim { color: #e74c3c; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Análise de Volume (µL)</h2>
        
        <div class="form-group">
            <label for="valorPadrao">Valor Padrão Esperado (µL):</label>
            <input type="number" id="valorPadrao" step="any" placeholder="Ex: 100">
        </div>

        <div class="form-group">
            <label for="valoresMedidos">Valores Medidos (cole um por linha):</label>
            <textarea id="valoresMedidos" rows="8" placeholder="Ex:&#10;99.8&#10;100.2&#10;99.5..."></textarea>
        </div>

        <button onclick="calcularResultados()">Calcular Resultados</button>

        <div id="areaResultados" class="resultados">
            <h3>Resultados:</h3>
            <p><strong>Número de Medidas (N):</strong> <span id="resN"></span></p>
            <p><strong>Média:</strong> <span id="resMedia"></span> µL</p>
            <p><strong>Desvio Padrão:</strong> <span id="resDP"></span> µL</p>
            <p><strong>Coeficiente de Variação (CV):</strong> <span id="resCV"></span>%</p>
            <p><strong>Erro Absoluto:</strong> <span id="resErroAbs"></span> µL</p>
            <p><strong>Erro Relativo:</strong> <span id="resErroRel"></span>%</p>
            <div id="resInterpretacao" class="interpretacao"></div>
        </div>
    </div>

    <script>
        /* LÓGICA (JavaScript) - Realiza os cálculos matemáticos */
        function calcularResultados() {
            // 1. Capturar os valores inseridos pelo utilizador
            const padrao = parseFloat(document.getElementById('valorPadrao').value);
            const textoValores = document.getElementById('valoresMedidos').value;

            // 2. Validação inicial: verificar se o padrão foi preenchido
            if (isNaN(padrao)) {
                alert("Por favor, insira um Valor Padrão válido.");
                return;
            }

            // 3. Transformar o texto do textarea num array (lista) de números
            // O comando 'split' separa o texto por quebras de linha ('\n')
            let valoresStr = textoValores.split('\n');
            let valoresNum = [];

            for (let i = 0; i < valoresStr.length; i++) {
                // Limpa espaços em branco e substitui vírgula por ponto (caso o utilizador use padrão PT/BR)
                let numLimpo = valoresStr[i].trim().replace(',', '.');
                if (numLimpo !== "") { // Ignora linhas em branco
                    let numero = parseFloat(numLimpo);
                    if (!isNaN(numero)) {
                        valoresNum.push(numero);
                    }
                }
            }

            const n = valoresNum.length;

            // 4. Validação: precisamos de pelo menos 2 valores para calcular o desvio padrão
            if (n < 2) {
                alert("Por favor, insira pelo menos 2 valores medidos válidos.");
                return;
            }

            // 5. Cálculos Estatísticos
            // Média
            let soma = 0;
            for(let i = 0; i < n; i++) {
                soma += valoresNum[i];
            }
            const media = soma / n;

            // Desvio Padrão (Amostral)
            let somaDiferencasQuadradas = 0;
            for(let i = 0; i < n; i++) {
                somaDiferencasQuadradas += Math.pow((valoresNum[i] - media), 2);
            }
            const desvioPadrao = Math.sqrt(somaDiferencasQuadradas / (n - 1));

            // Coeficiente de Variação (CV%) -> Medida de Precisão
            const cv = (desvioPadrao / media) * 100;

            // Erro Absoluto e Relativo -> Medida de Exatidão
            const erroAbsoluto = media - padrao;
            const erroRelativo = (erroAbsoluto / padrao) * 100;

            // 6. Atualizar a página HTML com os resultados (limitando a 3 casas decimais)
            document.getElementById('resN').innerText = n;
            document.getElementById('resMedia').innerText = media.toFixed(3);
            document.getElementById('resDP').innerText = desvioPadrao.toFixed(3);
            document.getElementById('resCV').innerText = cv.toFixed(3);
            document.getElementById('resErroAbs').innerText = erroAbsoluto.toFixed(3);
            document.getElementById('resErroRel').innerText = erroRelativo.toFixed(3);

            // 7. Interpretação dos Resultados
            // Parâmetros de exemplo: Erro relativo até 2% (Exatidão), CV até 1% (Precisão)
            let msgExatidao = Math.abs(erroRelativo) <= 2.0 ? "<span class='bom'>Exato</span>" : "<span class='ruim'>Inexato</span>";
            let msgPrecisao = cv <= 1.0 ? "<span class='bom'>Preciso</span>" : "<span class='ruim'>Impreciso</span>";

            let interpretacaoHTML = `
                <p><strong>Interpretação:</strong> O instrumento está 
                ${msgExatidao} (Erro relativo $\\le$ 2%) e 
                ${msgPrecisao} (CV $\\le$ 1%).</p>
            `;
            document.getElementById('resInterpretacao').innerHTML = interpretacaoHTML;

            // 8. Mostrar a caixa de resultados
            document.getElementById('areaResultados').style.display = 'block';
        }
    </script>

</body>
</html>
